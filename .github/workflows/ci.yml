name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck (-S warning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Lint all shell sources
        run: |
          shellcheck -S warning \
            llm-usage.tmux \
            scripts/usage.sh \
            scripts/teardown.sh \
            examples/static.sh \
            examples/litellm.sh \
            examples/ccusage.sh \
            test/smoke.sh

  smoke:
    name: functional smoke (isolated socket)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tmux + jq
        run: sudo apt-get update -qq && sudo apt-get install -y tmux jq
      - name: Show versions
        run: tmux -V && jq --version
      - name: Run smoke test
        # The plugin is portable POSIX sh + jq, so the full end-to-end suite runs
        # here on Linux (not just static checks). It uses a private tmux socket
        # via a PATH shim and never touches any real server.
        run: test/smoke.sh
